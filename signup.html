<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Join | F>F</title>
    <link rel="stylesheet" href="/src/css/style.css">
    <style>
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="bg-fof-black text-fof-white font-sans antialiased overflow-x-hidden min-h-screen flex items-center justify-center p-6" 
      x-data="authLogic()">

    <div class="w-full max-w-md">
        <!-- Logo -->
        <div class="text-center mb-10">
            <a href="/index.html" class="text-4xl font-display font-bold tracking-tighter">F<span class="text-fof-accent">&gt;</span>F</a>
            <p class="text-gray-500 text-xs uppercase tracking-[0.3em] mt-2">Faith Over Fear</p>
        </div>

        <div class="bg-zinc-900 border border-fof-gray p-8 sm:p-10 shadow-2xl relative overflow-hidden w-full">
            <!-- Background Accent -->
            <div class="absolute -top-24 -left-24 w-48 h-48 bg-fof-accent/5 rounded-full blur-3xl pointer-events-none"></div>

            <h1 class="text-2xl font-display font-bold uppercase tracking-tight mb-8">Join the Movement</h1>

            <form @submit.prevent="signup()" class="space-y-6">
                <div class="space-y-2">
                    <label class="block text-[10px] uppercase tracking-widest text-gray-400 font-bold">Full Name</label>
                    <input type="text" x-model="name" required
                           class="w-full bg-black border border-zinc-800 p-4 text-sm focus:border-fof-accent outline-none transition-all rounded-none placeholder-gray-700"
                           placeholder="John Doe">
                </div>

                <div class="space-y-2">
                    <label class="block text-[10px] uppercase tracking-widest text-gray-400 font-bold">Email Address</label>
                    <input type="email" x-model="email" required
                           class="w-full bg-black border border-zinc-800 p-4 text-sm focus:border-fof-accent outline-none transition-all rounded-none placeholder-gray-700"
                           placeholder="name@example.com">
                </div>

                <div class="space-y-2">
                    <label class="block text-[10px] uppercase tracking-widest text-gray-400 font-bold">Password</label>
                    <input type="password" x-model="password" required
                           class="w-full bg-black border border-zinc-800 p-4 text-sm focus:border-fof-accent outline-none transition-all rounded-none placeholder-gray-700"
                           placeholder="••••••••">
                </div>

                <div class="text-xs text-gray-500 font-light leading-relaxed">
                    By signing up, you agree to receive updates and news about new drops. You can unsubscribe at any time.
                </div>

                <button type="submit" 
                        class="w-full bg-fof-white text-black font-bold uppercase py-4 text-xs tracking-[0.2em] hover:bg-fof-accent hover:text-white transition-all transform active:scale-[0.98]"
                        :disabled="loading">
                    <span x-show="!loading">Join Now</span>
                    <span x-show="loading" x-cloak>Enlisting...</span>
                </button>
            </form>

            <p class="text-center text-[10px] uppercase tracking-widest text-gray-500 mt-10 font-bold">
                Already enlisted? <a href="/login.html" class="text-fof-accent hover:text-white transition-colors">Login</a>
            </p>
        </div>
    </div>

    <!-- Toast Notification -->
    <div x-data="{ show: false, message: '', type: 'success' }" 
         @notify.window="show = true; message = $event.detail.message; type = $event.detail.type || 'success'; setTimeout(() => show = false, 3000)"
         x-show="show"
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0 translate-y-2"
         x-transition:enter-end="opacity-100 translate-y-0"
         x-transition:leave="transition ease-in duration-100"
         x-transition:leave-start="opacity-100 translate-y-0"
         x-transition:leave-end="opacity-0 translate-y-2"
         class="fixed bottom-4 right-4 z-50 px-6 py-3 rounded-lg shadow-lg flex items-center space-x-3"
         :class="type === 'success' ? 'bg-zinc-800 text-fof-accent border border-fof-accent/20' : 'bg-red-900/90 text-white'">
         <span x-text="message"></span>
    </div>

    <script type="module" src="/src/js/entry/signup-entry.js"></script>
</body>
</html>
