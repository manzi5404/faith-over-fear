<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faith Over Fear — Coming Soon</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #000;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }
        .closed-page {
            width: 100%;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background: #000;
        }
        .closed-page::before {
            content: '';
            position: absolute;
            inset: 0;
            background: url('https://images.unsplash.com/photo-1503342217505-b0a15ec3261c?w=1400&q=80') center/cover no-repeat;
            opacity: 0.15;
            filter: grayscale(100%) contrast(1.1);
        }
        .closed-content {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 40px 24px;
            max-width: 720px;
            width: 100%;
        }
        .brand {
            font-size: clamp(48px, 10vw, 96px);
            font-weight: 900;
            letter-spacing: -2px;
            line-height: 1;
            margin-bottom: 24px;
            color: #fff;
        }
        .brand-accent {
            color: #ff3b3b;
        }
        .eyebrow {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: #888;
            margin-bottom: 16px;
        }
        .headline {
            font-size: clamp(24px, 4vw, 40px);
            font-weight: 800;
            letter-spacing: -0.5px;
            line-height: 1.15;
            margin-bottom: 20px;
            color: #fff;
        }
        .subtext {
            font-size: 15px;
            line-height: 1.7;
            color: #999;
            max-width: 520px;
            margin: 0 auto 36px;
        }
        .email-form {
            display: flex;
            gap: 10px;
            max-width: 480px;
            margin: 0 auto 16px;
        }
        .email-form input[type="email"] {
            flex: 1;
            padding: 16px 18px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(10,10,10,0.8);
            color: #fff;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }
        .email-form input[type="email"]:focus {
            border-color: rgba(255,255,255,0.4);
        }
        .email-form button {
            padding: 16px 24px;
            border-radius: 12px;
            border: 1px solid #fff;
            background: #fff;
            color: #000;
            font-weight: 900;
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .email-form button:hover {
            background: #ddd;
            border-color: #ddd;
        }
        .status-msg {
            font-size: 12px;
            color: #888;
            min-height: 18px;
            margin-top: 4px;
        }
        .footer-text {
            margin-top: 48px;
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #555;
        }
    </style>
</head>
<body>
    <div class="closed-page">
        <div class="closed-content">
            <p class="eyebrow">Faith Over Fear</p>
            <h1 class="brand">F<span class="brand-accent">&gt;</span>F</h1>
            <h2 class="headline">We’re taking a short break.</h2>
            <p class="subtext">
                We’re working on something new. Leave your email and we’ll notify you the moment we drop.
            </p>
            <form class="email-form" id="waitlist-form">
                <input type="email" id="email-input" placeholder="Enter your email" required />
                <button type="submit">Notify Me</button>
            </form>
            <div class="status-msg" id="status-msg"></div>
            <p class="footer-text">&copy; 2026 Faith Over Fear. All Rights Reserved.</p>
        </div>
    </div>

    <script>
        document.getElementById('waitlist-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email-input').value.trim();
            const status = document.getElementById('status-msg');
            if (!email) { status.textContent = 'Please enter your email.'; return; }
            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { status.textContent = 'Enter a valid email.'; return; }
            status.textContent = 'Submitting...';
            try {
                const res = await fetch('/api/waitlist', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, name: null, phone: null, source: 'site_closed' })
                });
                const data = await res.json();
                if (data.success) {
                    status.textContent = 'Done! We’ll notify you when we’re live.';
                    document.getElementById('email-input').value = '';
                } else {
                    status.textContent = data.error || 'Failed. Try again.';
                }
            } catch {
                status.textContent = 'Failed. Try again.';
            }
        });
    </script>
</body>
</html>
