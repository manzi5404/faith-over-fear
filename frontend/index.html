<!DOCTYPE html>
<html lang="en">
<head>
    <script>
      (function () {
        try {
          var played = sessionStorage.getItem('DOTTIE_intro_played') === '1';
          var reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
          if (played || reduced) document.documentElement.classList.add('DOTTIE-intro-skip');
        } catch (e) {}
        setTimeout(function () {
          var el = document.getElementById('DOTTIE-intro');
          if (el) el.remove();
        }, 9000);
        var apiBase = document.body && document.body.dataset && document.body.dataset.apiBaseUrl;
        if (apiBase) window.API_BASE_URL = apiBase;
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DOTTIE.YZ</title>
    <script>
      window.location.replace('/shop.html');
    </script>
</head>
<body data-api-base-url="https://dottie-yz-mqgz.onrender.com" style="background:#000;margin:0;">
</body>
</html>
