<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DOTTIE.YZ — Temporarily Closed</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: 'Inter', sans-serif;
    background: #000;
    color: #fff;
  }

  /* ===== Slider ===== */
  #bg-slider {
    position: fixed; inset: 0; z-index: 0;
  }
  .slide {
    position: absolute; inset: -20px;
    background-size: cover;
    background-position: center;
    opacity: 0;
    transition: opacity 1.5s cubic-bezier(.4,0,.2,1), transform 8s ease-out;
    will-change: transform, opacity;
  }
  .slide.active {
    opacity: 1;
    animation: breathe 10s ease-in-out infinite;
  }
  .slide.prev {
    opacity: 0;
    transform: scale(1.15);
  }
  @keyframes breathe {
    0%   { transform: scale(1) translate(0, 0) rotate(0deg); }
    25%  { transform: scale(1.05) translate(-8px, 5px) rotate(-.5deg); }
    50%  { transform: scale(1.08) translate(5px, -8px) rotate(.5deg); }
    75%  { transform: scale(1.03) translate(-3px, -3px) rotate(-.3deg); }
    100% { transform: scale(1) translate(0, 0) rotate(0deg); }
  }
  #bg-overlay {
    position: fixed; inset: 0; z-index: 1;
    background: linear-gradient(135deg, rgba(0,0,0,.85) 0%, rgba(0,0,0,.78) 50%, rgba(0,0,0,.82) 100%);
  }

  /* ===== Progress Bar ===== */
  #progress-bar {
    position: fixed; top: 0; left: 0; height: 3px; z-index: 10;
    background: linear-gradient(90deg, #fff 0%, rgba(255,255,255,.6) 100%);
    width: 0%;
    transition: width .05s linear;
    box-shadow: 0 0 10px rgba(255,255,255,.3);
  }

  /* ===== Noise ===== */
  #noise {
    position: fixed; inset: 0; z-index: 2; pointer-events: none; opacity: .035;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
    background-repeat: repeat;
  }

  /* ===== Ambient Light ===== */
  #ambient-light {
    position: fixed; width: 600px; height: 600px; border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,.03) 0%, transparent 70%);
    pointer-events: none; z-index: 3;
    transition: transform .3s ease-out, opacity .3s ease;
    opacity: 0;
  }

  /* ===== Particles ===== */
  .particle {
    position: fixed; border-radius: 50%; background: #fff; z-index: 3; pointer-events: none;
    box-shadow: 0 0 4px rgba(255,255,255,.3);
  }
  @keyframes float-up {
    0%   { opacity: 0; transform: translateY(0) scale(0); }
    15%  { opacity: .7; }
    85%  { opacity: .5; }
    100% { opacity: 0; transform: translateY(-100vh) scale(1); }
  }
  @keyframes float-drift {
    0%   { opacity: 0; transform: translate(0, 0) scale(0); }
    15%  { opacity: .5; }
    85%  { opacity: .4; }
    100% { opacity: 0; transform: translate(100px, -80vh) scale(.8); }
  }

  /* ===== Card ===== */
  #card {
    position: fixed; right: 6vw; top: 50%; z-index: 5;
    transform: translateY(-50%);
    width: min(440px, 88vw);
    padding: 52px 44px;
    background: rgba(10,10,10,.5);
    backdrop-filter: blur(32px);
    -webkit-backdrop-filter: blur(32px);
    border: 1px solid rgba(255,255,255,.1);
    border-radius: 28px;
    box-shadow: 0 50px 120px rgba(0,0,0,.7), inset 0 1px 0 rgba(255,255,255,.08);
    opacity: 0;
    animation: cardIn 1.2s .5s cubic-bezier(.2,.8,.2,1) forwards;
    transition: transform .15s ease-out;
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(-50%) translateX(40px) scale(.95); }
    to   { opacity: 1; transform: translateY(-50%) translateX(0) scale(1); }
  }

  /* ===== Logo ===== */
  #logo {
    font-size: 11px; font-weight: 700; letter-spacing: 6px; text-transform: uppercase;
    color: rgba(255,255,255,.6); margin-bottom: 36px;
    opacity: 0; animation: fadeIn 1s .2s ease forwards;
    position: relative;
    display: inline-block;
  }
  #logo::after {
    content: '';
    position: absolute; bottom: -8px; left: 0; width: 24px; height: 1px;
    background: rgba(255,255,255,.3);
    opacity: 0;
    animation: lineIn .6s .6s ease forwards;
  }
  @keyframes lineIn {
    from { opacity: 0; width: 0; }
    to { opacity: 1; width: 24px; }
  }

  /* ===== Typography ===== */
  h1 {
    font-size: clamp(36px, 5vw, 58px);
    font-weight: 800; line-height: 1.05; letter-spacing: -2px;
    margin-bottom: 24px;
    opacity: 0; animation: fadeUp .9s .4s cubic-bezier(.2,.8,.2,1) forwards;
  }
  #desc {
    font-size: 15px; line-height: 1.75; color: rgba(255,255,255,.6);
    margin-bottom: 36px; max-width: 400px;
    opacity: 0; animation: fadeUp .9s .6s cubic-bezier(.2,.8,.2,1) forwards;
  }

  /* ===== Form ===== */
  #email-form { display: flex; gap: 12px; opacity: 0; animation: fadeUp .9s .8s cubic-bezier(.2,.8,.2,1) forwards; }
  #email {
    flex: 1; padding: 18px 20px; border-radius: 16px; border: 1px solid rgba(255,255,255,.15);
    background: rgba(255,255,255,.05); backdrop-filter: blur(16px); color: #fff; font-size: 14px;
    font-family: inherit; outline: none; transition: all .3s;
  }
  #email:focus {
    border-color: rgba(255,255,255,.4);
    background: rgba(255,255,255,.08);
    box-shadow: 0 0 0 6px rgba(255,255,255,.04), 0 0 40px rgba(255,255,255,.06);
    transform: translateY(-1px);
  }
  #email::placeholder { color: rgba(255,255,255,.3); }
  #submit {
    padding: 18px 26px; border-radius: 16px; border: 1px solid rgba(255,255,255,.2);
    background: rgba(255,255,255,.95); color: #000; font-weight: 800; font-size: 12px;
    letter-spacing: 2.5px; text-transform: uppercase; cursor: pointer; font-family: inherit;
    transition: all .25s; white-space: nowrap; position: relative; overflow: hidden;
  }
  #submit::before {
    content: '';
    position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,.4), transparent);
    transition: left .5s;
  }
  #submit:hover::before { left: 100%; }
  #submit:hover {
    transform: translateY(-3px);
    box-shadow: 0 15px 40px rgba(255,255,255,.25), 0 0 0 1px rgba(255,255,255,.1);
    border-color: rgba(255,255,255,.4);
  }
  #submit:active { transform: scale(.95) translateY(0); }
  #submit.success {
    background: transparent; color: #fff; border-color: rgba(255,255,255,.25);
    cursor: default; pointer-events: none;
  }
  #submit.success::before { display: none; }

  /* ===== Status ===== */
  #status {
    margin-top: 18px; font-size: 12px; color: rgba(255,255,255,.5); min-height: 18px;
    opacity: 0; animation: fadeIn .8s 1s ease forwards;
    display: flex; align-items: center; gap: 8px;
  }
  .checkmark {
    display: none; width: 16px; height: 16px;
    stroke: #fff; stroke-width: 2.5; fill: none;
    stroke-linecap: round; stroke-linejoin: round;
    stroke-dasharray: 24; stroke-dashoffset: 24;
    animation: draw .5s ease forwards;
  }
  @keyframes draw {
    to { stroke-dashoffset: 0; }
  }

  /* ===== Footer ===== */
  #footer {
    position: fixed; bottom: 32px; left: 0; right: 0; z-index: 5; text-align: center;
    font-size: 11px; letter-spacing: 4px; text-transform: uppercase; color: rgba(255,255,255,.2);
    opacity: 0; animation: fadeIn .8s 1.2s ease forwards;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  /* ===== Slide Dots ===== */
  #slide-dots {
    position: fixed; bottom: 32px; right: 40px; z-index: 6;
    display: flex; gap: 8px;
    opacity: 0; animation: fadeIn .8s 1.4s ease forwards;
  }
  .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: rgba(255,255,255,.25);
    transition: all .4s;
  }
  .dot.active {
    background: #fff;
    box-shadow: 0 0 8px rgba(255,255,255,.6);
    width: 20px; border-radius: 3px;
  }

  /* ===== Mobile ===== */
  @media (max-width: 768px) {
    #card {
      right: 3vw; left: 3vw; bottom: 3vh; top: auto;
      transform: none; width: auto;
      padding: 40px 28px;
      animation-name: cardInMobile;
      border-radius: 24px;
    }
    @keyframes cardInMobile {
      from { opacity: 0; transform: translateY(40px) scale(.95); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    #email-form { flex-direction: column; }
    #submit { width: 100%; }
    #progress-bar { height: 2px; }
    #slide-dots { right: 50%; transform: translateX(50%); bottom: 20px; }
    #footer { bottom: 20px; font-size: 10px; }
    h1 { font-size: clamp(28px, 7vw, 40px); }
    #desc { font-size: 13px; }
  }

  /* ===== Loading shimmer ===== */
  .slide-loading {
    background: linear-gradient(90deg, #0a0a0a 0%, #1a1a1a 50%, #0a0a0a 100%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
  }
  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }
</style>
</head>
<body>

<!-- Background Slider -->
<div id="bg-slider">
  <div class="slide active slide-loading" style="background-image: url('data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height=%22200%22%3E%3Crect width=%22200%22 height=%22200%22 fill=%22%230a0a0a%22/%3E%3C/svg%3E');"></div>
  <div class="slide slide-loading" style="background-image: url('data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height=%22200%22%3E%3Crect width=%22200%22 height=%22200%22 fill=%22%230a0a0a%22/%3E%3C/svg%3E');"></div>
  <div class="slide slide-loading" style="background-image: url('data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height=%22200%22%3E%3Crect width=%22200%22 height=%22200%22 fill=%22%230a0a0a%22/%3E%3C/svg%3E');"></div>
</div>
<div id="bg-overlay"></div>
<div id="progress-bar"></div>
<div id="noise"></div>
<div id="ambient-light"></div>

<!-- Slide Dots -->
<div id="slide-dots">
  <div class="dot active"></div>
  <div class="dot"></div>
  <div class="dot"></div>
</div>

<!-- Floating Glass Card -->
<div id="card">
  <div id="logo">DOTTIE.YZ</div>
  <h1>The Store Is<br>Temporarily Closed.</h1>
  <p id="desc">Every drop is released with intention. We're preparing the next chapter. Leave your email and we'll let you know the moment the doors reopen.</p>
  <form id="email-form">
    <input id="email" type="email" placeholder="Enter your email" required autocomplete="email" />
    <button id="submit" type="submit">Notify Me</button>
  </form>
  <div id="status"></div>
</div>

<div id="footer">Crafted with purpose. See you soon.</div>

<script>
  (function() {
    const slides = document.querySelectorAll('.slide');
    const dots = document.querySelectorAll('.dot');
    const bar = document.getElementById('progress-bar');
    const form = document.getElementById('email-form');
    const input = document.getElementById('email');
    const btn = document.getElementById('submit');
    const status = document.getElementById('status');
    const card = document.getElementById('card');
    const overlay = document.getElementById('bg-overlay');
    const ambient = document.getElementById('ambient-light');
    let current = 0;
    const slideTime = 6000;
    let progressStart = Date.now();
    let isTransitioning = false;

    // Fetch images from admin settings
    async function loadImages() {
      try {
        const res = await fetch('/api/settings');
        const data = await res.json();
        const images = data.settings?.siteClosedImages || [];
        const urls = Array.isArray(images) ? images.filter(Boolean) : [];
        if (urls.length === 0) return;

        slides.forEach((slide, i) => {
          if (i < urls.length) {
            slide.classList.remove('slide-loading');
            slide.style.backgroundImage = `url('${urls[i]}')`;
          }
        });
      } catch (e) {
        console.warn('Failed to load closed page images:', e);
      }
    }

    function nextSlide() {
      if (isTransitioning) return;
      isTransitioning = true;

      slides[current].classList.remove('active');
      slides[current].classList.add('prev');
      dots[current].classList.remove('active');

      current = (current + 1) % slides.length;
      slides[current].classList.remove('prev');
      slides[current].classList.add('active');
      dots[current].classList.add('active');

      setTimeout(() => {
        slides.forEach(s => s.classList.remove('prev'));
        isTransitioning = false;
      }, 1500);

      progressStart = Date.now();
    }

    function updateProgress() {
      const elapsed = Date.now() - progressStart;
      const pct = Math.min((elapsed / slideTime) * 100, 100);
      bar.style.width = pct + '%';
      requestAnimationFrame(updateProgress);
    }

    // Initialize
    loadImages();
    setInterval(nextSlide, slideTime);
    requestAnimationFrame(updateProgress);

    // Ambient light follows mouse
    let mouseX = window.innerWidth / 2;
    let mouseY = window.innerHeight / 2;
    let ambientX = mouseX;
    let ambientY = mouseY;

    document.addEventListener('mousemove', (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;
    });

    function updateAmbient() {
      ambientX += (mouseX - ambientX) * .02;
      ambientY += (mouseY - ambientY) * .02;
      ambient.style.transform = `translate(${ambientX - 300}px, ${ambientY - 300}px)`;
      ambient.style.opacity = '1';
      requestAnimationFrame(updateAmbient);
    }
    requestAnimationFrame(updateAmbient);

    // Card parallax
    document.addEventListener('mousemove', (e) => {
      const x = (e.clientX / window.innerWidth - .5) * 25;
      const y = (e.clientY / window.innerHeight - .5) * 25;
      card.style.transform = `translateY(-50%) translate(${x * .3}px, ${y * .3}px)`;
      overlay.style.background = `linear-gradient(135deg, rgba(0,0,0,${.85 - Math.abs(x) * .001}) 0%, rgba(0,0,0,${.78 - Math.abs(y) * .001}) 50%, rgba(0,0,0,${.82 - Math.abs(x) * .001}) 100%)`;
    });

    // Touch swipe support
    let touchStartX = 0;
    document.addEventListener('touchstart', (e) => {
      touchStartX = e.touches[0].clientX;
    }, { passive: true });
    document.addEventListener('touchend', (e) => {
      const diff = touchStartX - e.changedTouches[0].clientX;
      if (Math.abs(diff) > 50) {
        if (diff > 0) nextSlide();
        else {
          current = (current - 1 + slides.length) % slides.length;
          slides.forEach(s => s.classList.remove('prev', 'active'));
          slides[current].classList.add('active');
          dots.forEach(d => d.classList.remove('active'));
          dots[current].classList.add('active');
          progressStart = Date.now();
        }
      }
    });

    // Particles
    function createParticles() {
      for (let i = 0; i < 25; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        const size = 1 + Math.random() * 2.5;
        p.style.width = p.style.height = size + 'px';
        p.style.left = Math.random() * 100 + 'vw';
        p.style.top = Math.random() * 100 + 'vh';
        const duration = 12 + Math.random() * 18;
        const delay = Math.random() * 10;
        const anim = Math.random() > .5 ? 'float-up' : 'float-drift';
        p.style.animation = `${anim} ${duration}s ${delay}s linear infinite`;
        document.body.appendChild(p);
      }
    }
    createParticles();

    // Submit
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = input.value.trim();
      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        status.innerHTML = '<span style="color:rgba(255,255,255,.5)">Please enter a valid email.</span>';
        return;
      }
      status.innerHTML = '<span style="color:rgba(255,255,255,.5)">Submitting...</span>';
      try {
        const res = await fetch('/api/waitlist', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, name: null, phone: null, source: 'site_closed' })
        });
        const data = await res.json();
        if (data.success) {
          btn.innerHTML = '<span class="checkmark"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></span> You\'re In';
          btn.classList.add('success');
          input.value = '';
          setTimeout(() => {
            status.innerHTML = "<span style='color:rgba(255,255,255,.7)'>We'll let you know first.</span>";
          }, 600);
        } else {
          status.innerHTML = `<span style="color:rgba(255,255,255,.5)">${data.error || 'Failed. Try again.'}</span>`;
        }
      } catch {
        status.innerHTML = '<span style="color:rgba(255,255,255,.5)">Failed. Try again.</span>';
      }
    });
  })();
</script>
</body>
</html>
