[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "18"

[[redirects]]
  from = "/api/*"
  to = "https://fof-backend-production.up.railway.app/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/admin/api/*"
  to = "https://fof-backend-production.up.railway.app/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200

[[redirects]]
  from = "/admin/*"
  to = "/admin/index.html"
  status = 200